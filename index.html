<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space of Transmission</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
  }

  .wrapper {
    position: relative;
    width: 900px;
    height: 600px;
  }

  svg {
    width: 900px;
    height: 600px;
  }

  /* floorplan lines */
  .wall {
    stroke: black;
    stroke-width: 2;
  }

  .wall.dashed {
    stroke-dasharray: 6 6;
  }

  /* node groups */
  .node {
    cursor: pointer;
  }

  /* ring behaviour — clearer threshold */
  .ring {
    fill: none;
    stroke: black;
    stroke-width: 10;
    pointer-events: stroke;

    transform-box: fill-box;
    transform-origin: center;
    transition:
      transform 0.6s cubic-bezier(.2,0,.1,1),
      stroke-dashoffset 0.4s ease;
    transition-delay: 0.25s;
  }

  .node:hover .ring {
    transform: rotate(calc(var(--rot) * 2));
    stroke-dashoffset: calc(var(--off) + 25);
  }

  /* infrastructure response */
  .axis {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.6s ease;
    transition-delay: 0.4s; /* reacts after ring */
  }

  /* transversal movement */
  .node:hover .axis.vert {
    transform: translateX(14px);
  }

  .node:hover .axis.horiz {
    transform: translateY(-14px);
  }
</style>
</head>

<body>

<div class="wrapper">

<svg viewBox="0 0 900 600">

  <!-- FLOORPLAN -->

  <line x1="120" y1="90"  x2="720" y2="90"  class="wall"/>

  <!-- vertical line + node -->
  <g class="node" style="--rot:14deg; --off:80;">
    <line x1="720" y1="90" x2="720" y2="210"
          class="wall dashed axis vert"/>
    <circle class="ring"
      cx="720" cy="210" r="26"
      stroke-dasharray="110 50"
      stroke-dashoffset="80"/>
  </g>

  <line x1="720" y1="210" x2="560" y2="210" class="wall"/>

  <line x1="120" y1="90"  x2="120" y2="320" class="wall dashed"/>

  <!-- horizontal line + node -->
  <g class="node" style="--rot:11deg; --off:10;">
    <line x1="120" y1="320" x2="300" y2="320"
          class="wall axis horiz"/>
    <circle class="ring"
      cx="300" cy="420" r="26"
      stroke-dasharray="110 50"
      stroke-dashoffset="10"/>
  </g>

  <line x1="300" y1="320" x2="300" y2="180" class="wall dashed"/>
  <line x1="300" y1="180" x2="520" y2="180" class="wall"/>
  <line x1="520" y1="180" x2="520" y2="420" class="wall dashed"/>

  <line x1="200" y1="420" x2="520" y2="420" class="wall"/>
  <line x1="200" y1="420" x2="200" y2="500" class="wall dashed"/>

  <!-- remaining nodes (unchanged, no moving lines) -->

  <g class="node" style="--rot:12deg; --off:0;">
    <circle class="ring"
      cx="300" cy="90" r="26"
      stroke-dasharray="120 40"
      stroke-dashoffset="0"/>
  </g>

  <g class="node" style="--rot:-10deg; --off:40;">
    <circle class="ring"
      cx="520" cy="90" r="26"
      stroke-dasharray="130 30"
      stroke-dashoffset="40"/>
  </g>

  <g class="node" style="--rot:-12deg; --off:20;">
    <circle class="ring"
      cx="120" cy="200" r="26"
      stroke-dasharray="120 40"
      stroke-dashoffset="20"/>
  </g>

  <g class="node" style="--rot:9deg; --off:60;">
    <circle class="ring"
      cx="300" cy="180" r="26"
      stroke-dasharray="130 30"
      stroke-dashoffset="60"/>
  </g>

  <g class="node" style="--rot:-14deg; --off:100;">
    <circle class="ring"
      cx="520" cy="300" r="26"
      stroke-dasharray="120 40"
      stroke-dashoffset="100"/>
  </g>

  <g class="node" style="--rot:-8deg; --off:90;">
    <circle class="ring"
      cx="200" cy="420" r="26"
      stroke-dasharray="130 30"
      stroke-dashoffset="90"/>
  </g>

  <g class="node" style="--rot:13deg; --off:130;">
    <circle class="ring"
      cx="200" cy="500" r="26"
      stroke-dasharray="120 40"
      stroke-dashoffset="130"/>
  </g>

</svg>

</div>

</body>
</html>
